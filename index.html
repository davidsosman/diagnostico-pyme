<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagnóstico Inicial Empresas PYME</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg: #F7F5F0; --surface: #FFFFFF; --border: #E2DDD6;
    --text: #1A1714; --text-secondary: #6B6560;
    --accent: #2D5016; --accent-light: #EEF4E8;
    --danger: #C0392B; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px; }
  .container { max-width: 720px; margin: 0 auto; }
  .intro { text-align: center; padding: 48px 24px; }
  .intro-badge { display: inline-block; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; margin-bottom: 24px; }
  .intro h1 { font-family: 'DM Serif Display', serif; font-size: 38px; line-height: 1.15; margin-bottom: 16px; }
  .intro p { font-size: 15px; color: var(--text-secondary); line-height: 1.7; max-width: 480px; margin: 0 auto 32px; }
  .benefits { display: flex; flex-direction: column; gap: 10px; margin: 0 auto 40px; max-width: 380px; text-align: left; }
  .benefit { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .benefit-dot { width: 22px; height: 22px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; color: var(--accent); font-weight: 700; }
  .name-input-wrap { margin-bottom: 32px; }
  .name-input-wrap label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--text-secondary); text-align: left; max-width: 380px; margin-left: auto; margin-right: auto; }
  .name-input { width: 100%; max-width: 380px; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 15px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.2s; }
  .name-input:focus { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: white; border: none; padding: 14px 36px; border-radius: 100px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
  .progress-label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
  .progress-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.4s ease; }
  .progress-pct { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; }
  .section-header { padding: 18px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .section-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .section-title { font-size: 16px; font-weight: 600; }
  .section-count { font-size: 13px; color: var(--text-secondary); margin-left: auto; }
  .question-row { padding: 16px 24px; border-bottom: 1px solid var(--border); }
  .question-row:last-child { border-bottom: none; }
  .question-text { font-size: 14px; line-height: 1.55; margin-bottom: 12px; }
  .scale-row { display: flex; gap: 8px; }
  .scale-btn { flex: 1; padding: 8px 4px; border: 1.5px solid var(--border); border-radius: 8px; background: transparent; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; color: var(--text-secondary); display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .scale-btn .scale-num { font-size: 16px; font-weight: 700; }
  .scale-btn .scale-label { font-size: 9px; text-align: center; line-height: 1.2; }
  .scale-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .scale-btn.selected { color: white; }
  .open-question { padding: 16px 24px; border-bottom: 1px solid var(--border); }
  .open-question:last-child { border-bottom: none; }
  .open-label { font-size: 14px; line-height: 1.55; margin-bottom: 10px; }
  .open-textarea { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; resize: vertical; min-height: 80px; outline: none; color: var(--text); transition: border-color 0.2s; }
  .open-textarea:focus { border-color: var(--accent); }
  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 12px; }
  .btn-secondary { background: transparent; color: var(--text-secondary); border: 1.5px solid var(--border); padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; }
  .btn-secondary:hover { border-color: var(--text); color: var(--text); }
  .unanswered-msg { font-size: 13px; color: var(--danger); }
  .results-header { text-align: center; padding: 40px 24px 24px; }
  .results-header h2 { font-family: 'DM Serif Display', serif; font-size: 32px; margin-bottom: 8px; }
  .level-badge { display: inline-block; padding: 8px 20px; border-radius: 100px; font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .score-big { font-size: 48px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .score-sub { font-size: 13px; color: var(--text-secondary); }
  .area-scores { padding: 0 0 20px; }
  .area-row { padding: 14px 24px; border-bottom: 1px solid var(--border); }
  .area-row:last-child { border-bottom: none; }
  .area-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .area-name { font-size: 14px; font-weight: 500; }
  .area-pct { font-size: 13px; font-weight: 600; }
  .area-bar-bg { height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .area-bar-fill { height: 100%; border-radius: 100px; transition: width 0.6s ease; }
  .send-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-top: 16px; text-align: center; }
  .send-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .send-section p { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .send-status { font-size: 14px; font-weight: 500; padding: 12px; border-radius: 8px; }
  .send-status.success { background: var(--accent-light); color: var(--accent); }
  .send-status.error { background: #FEF0EE; color: var(--danger); }
  .restart-btn { margin-top: 16px; display: inline-block; background: transparent; border: none; color: var(--text-secondary); font-size: 13px; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const MAKE_WEBHOOK = 'https://hook.us2.make.com/dpdj7irtdqjlgjtuuqe11gme5gwj38yq';

const sections = [
  { id: 'estrategia', title: 'Estrategia y Visión', color: '#534AB7', questions: ['Tenemos una visión y estrategia empresarial claramente definidas y documentadas.','Nuestros objetivos de largo plazo (5–10 años) están claramente definidos y guían nuestras decisiones.','Tenemos claramente definido nuestro cliente ideal y mercado objetivo.','Nuestra propuesta de valor o diferenciación competitiva es clara.'] },
  { id: 'visibilidad', title: 'Visibilidad Financiera', color: '#185FA5', questions: ['Nuestros estados financieros son precisos y se entregan mensualmente.','Operamos con un presupuesto y comparamos regularmente resultados reales contra el plan.','Entendemos claramente qué productos, servicios o clientes generan más rentabilidad.','Podemos responder rápidamente preguntas sobre dónde ganamos dinero, qué priorizar y qué afecta nuestra rentabilidad.'] },
  { id: 'contabilidad', title: 'Contabilidad y Reportes', color: '#0F6E56', questions: ['Nuestra contabilidad está limpia, actualizada y es confiable.','Los reportes financieros son claros y fáciles de entender para la dirección.','El equipo directivo utiliza la información financiera para tomar decisiones.','Monitoreamos activamente el flujo de caja.'] },
  { id: 'disciplina', title: 'Disciplina Operativa', color: '#854F0B', questions: ['Tenemos un proceso estructurado de planeación anual.','Realizamos revisiones trimestrales del negocio para evaluar resultados y ajustar planes.','El equipo directivo tiene reuniones semanales estructuradas para revisar prioridades.','Las decisiones operativas se toman basadas en datos y métricas.'] },
  { id: 'metricas', title: 'Métricas y KPIs', color: '#993556', questions: ['Medimos un conjunto claro de KPIs que reflejan la salud del negocio.','La dirección revisa estos indicadores semanal o mensualmente.','Cada área o líder tiene métricas claras por las cuales es responsable.','Contamos con un scorecard o dashboard de desempeño.'] },
  { id: 'sistemas', title: 'Sistemas y Procesos', color: '#5F5E5A', questions: ['Nuestros procesos clave están documentados.','Nuestros sistemas facilitan la operación y los reportes financieros.','La información fluye correctamente entre sistemas financieros y operativos.','Existe un responsable claro para cada proceso clave del negocio.'] },
  { id: 'crecimiento', title: 'Preparación para el Crecimiento', color: '#3B6D11', questions: ['Tenemos claridad sobre qué se necesita para escalar el negocio.','Identificamos regularmente oportunidades para mejorar la rentabilidad.','La dirección confía en los números al tomar decisiones estratégicas.','Tenemos un plan de crecimiento claro, con metas, plazos y responsables definidos.'] },
];

const scaleLabels = { 1: 'Débil', 2: 'Bajo', 3: 'Aceptable', 4: 'Bueno', 5: 'Fuerte' };
const levels = [
  { min: 0,  max: 39,  label: 'Crítico',             color: '#C0392B', bg: '#FEF0EE' },
  { min: 40, max: 54,  label: 'En Desarrollo',        color: '#E67E22', bg: '#FEF5EC' },
  { min: 55, max: 69,  label: 'En Progreso',          color: '#D4AC0D', bg: '#FEFBE6' },
  { min: 70, max: 84,  label: 'Maduro',               color: '#27AE60', bg: '#EAF8EF' },
  { min: 85, max: 100, label: 'Excelencia Operativa', color: '#2D5016', bg: '#EEF4E8' },
];
function getLevel(pct) { return levels.find(l => pct >= l.min && pct <= l.max) || levels[0]; }

let state = { step: 'intro', empresa: '', website: '', answers: {}, openDesafios: '', openMejora: '', currentSection: 0, sendStatus: null, sendMsg: '' };

function calcResults() {
  const areas = sections.map(sec => {
    const scores = sec.questions.map((_, i) => state.answers[sec.id + '_' + i] || 0);
    const sum = scores.reduce((a,b) => a+b, 0);
    const max = sec.questions.length * 5;
    return { id: sec.id, title: sec.title, color: sec.color, scores, sum, max, pct: Math.round(sum/max*100) };
  });
  const totalSum = areas.reduce((a,b) => a+b.sum, 0);
  const totalMax = areas.reduce((a,b) => a+b.max, 0);
  const totalPct = Math.round(totalSum/totalMax*100);
  return { areas, totalSum, totalMax, totalPct };
}

function render() {
  const app = document.getElementById('app');
  if (state.step === 'intro') app.innerHTML = renderIntro();
  else if (state.step === 'contexto') app.innerHTML = renderContexto();
  else if (state.step === 'survey') app.innerHTML = renderSurvey();
  else app.innerHTML = renderConfirmacion();
  attachEvents();
}

function renderIntro() {
  return '<div class="intro">' +
    '<div class="intro-badge">Diagnóstico Empresarial</div>' +
    '<h1>Diagnóstico Inicial<br><em>Empresas PYME</em></h1>' +
    '<p>Esta evaluación mide la claridad financiera, disciplina operativa y preparación para el crecimiento de tu empresa. Toma aproximadamente 5–7 minutos.</p>' +
    '<div class="benefits">' +
      '<div class="benefit"><div class="benefit-dot">1</div>Tu nivel de madurez por área</div>' +
      '<div class="benefit"><div class="benefit-dot">2</div>Diagnóstico de principales áreas de mejora</div>' +
      '<div class="benefit"><div class="benefit-dot">3</div>Recomendaciones de crecimiento y rentabilidad</div>' +
    '</div>' +
    '<div class="name-input-wrap">' +
      '<label>Nombre de la empresa</label>' +
      '<input class="name-input" id="empresaInput" type="text" placeholder="Ej: Comercial Los Andes SpA" value="' + state.empresa + '" />' +
    '</div>' +
    '<div class="name-input-wrap">' +
      '<label>Página web (opcional)</label>' +
      '<input class="name-input" id="websiteInput" type="text" placeholder="Ej: www.miempresa.cl" value="' + state.website + '" />' +
    '</div>' +
    '<button class="btn-primary" id="startBtn">Comenzar diagnóstico →</button>' +
  '</div>';
}

function renderContexto() {
  return '<div class="section-card">' +
    '<div class="section-header">' +
      '<span class="section-title">Cuéntanos sobre ' + (state.empresa || 'tu empresa') + '</span>' +
    '</div>' +
    '<div class="open-question">' +
      '<div class="open-label">¿Cuáles son los principales desafíos que enfrenta tu empresa hoy?</div>' +
      '<textarea class="open-textarea" id="openDesafios" placeholder="Describe brevemente...">' + state.openDesafios + '</textarea>' +
    '</div>' +
    '<div class="open-question">' +
      '<div class="open-label">¿Cuál es la mejora más prioritaria que quisieras lograr en los próximos 6 meses?</div>' +
      '<textarea class="open-textarea" id="openMejora" placeholder="Describe brevemente...">' + state.openMejora + '</textarea>' +
    '</div>' +
  '</div>' +
  '<div class="nav-row">' +
    '<button class="btn-secondary" id="prevBtn">← Anterior</button>' +
    '<button class="btn-primary" id="nextContextoBtn">Comenzar evaluación →</button>' +
  '</div>';
}


function renderSurvey() {
  const sec = sections[state.currentSection];
  const isLast = state.currentSection === sections.length - 1;
  const totalQ = sections.reduce(function(a,s){ return a + s.questions.length; }, 0);
  const answered = Object.keys(state.answers).length;
  const pct = Math.round(answered / totalQ * 100);
  const secAnswered = sec.questions.every(function(_, i){ return state.answers[sec.id + '_' + i]; });

  let html = '<div class="progress-wrap">' +
    '<span class="progress-label">Sección ' + (state.currentSection+1) + ' de ' + sections.length + '</span>' +
    '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>' +
    '<span class="progress-pct">' + pct + '%</span>' +
  '</div>' +
  '<div class="section-card">' +
    '<div class="section-header">' +
      '<div class="section-color-dot" style="background:' + sec.color + '"></div>' +
      '<span class="section-title">' + sec.title + '</span>' +
      '<span class="section-count">' + sec.questions.length + ' preguntas</span>' +
    '</div>';

  sec.questions.forEach(function(q, i) {
    const key = sec.id + '_' + i;
    const val = state.answers[key];
    html += '<div class="question-row">' +
      '<div class="question-text">' + q + '</div>' +
      '<div class="scale-row">';
    [1,2,3,4,5].forEach(function(n) {
      const selected = val === n;
      html += '<button class="scale-btn' + (selected ? ' selected' : '') + '" data-key="' + key + '" data-val="' + n + '"' +
        (selected ? ' style="background:' + sec.color + ';border-color:' + sec.color + '"' : '') + '>' +
        '<span class="scale-num">' + n + '</span>' +
        '<span class="scale-label">' + scaleLabels[n] + '</span>' +
      '</button>';
    });
    html += '</div></div>';
  });

  if (isLast) {
    html += '';
  }

  html += '</div>' +
  '<div class="nav-row">' +
    (state.currentSection > 0 ? '<button class="btn-secondary" id="prevBtn">← Anterior</button>' : '<div></div>') +
    '<div style="display:flex;align-items:center;gap:12px">' +
      (!secAnswered ? '<span class="unanswered-msg">Responde todas las preguntas</span>' : '') +
      '<button class="btn-primary" id="nextBtn"' + (!secAnswered ? ' disabled' : '') + '>' +
        (isLast ? 'Finalizar diagnóstico' : 'Siguiente →') +
      '</button>' +
    '</div>' +
  '</div>';
  return html;
}

function renderConfirmacion() {
  let content = '';
  if (state.sendStatus === 'loading') {
    content = '<div style="text-align:center;padding:60px 24px">' +
      '<div style="font-size:40px;margin-bottom:16px">⏳</div>' +
      '<h2 style="font-family:\'DM Serif Display\',serif;font-size:28px;margin-bottom:8px">Enviando diagnóstico...</h2>' +
      '<p style="font-size:15px;color:var(--text-secondary)">Por favor espera un momento.</p>' +
    '</div>';
  } else if (state.sendStatus === 'success') {
    content = '<div style="text-align:center;padding:60px 24px">' +
      '<div style="font-size:40px;margin-bottom:16px">✅</div>' +
      '<h2 style="font-family:\'DM Serif Display\',serif;font-size:28px;margin-bottom:12px">¡Diagnóstico enviado!</h2>' +
      '<p style="font-size:15px;color:var(--text-secondary);max-width:380px;margin:0 auto 32px">Tus respuestas han sido registradas correctamente. Nos pondremos en contacto contigo con el análisis y recomendaciones.</p>' +
      '<button class="btn-primary" id="restartBtn">Iniciar nuevo diagnóstico</button>' +
    '</div>';
  } else {
    content = '<div style="text-align:center;padding:60px 24px">' +
      '<div style="font-size:40px;margin-bottom:16px">❌</div>' +
      '<h2 style="font-family:\'DM Serif Display\',serif;font-size:28px;margin-bottom:12px">Ocurrió un error</h2>' +
      '<p style="font-size:15px;color:var(--text-secondary);margin-bottom:24px">' + state.sendMsg + '</p>' +
      '<button class="btn-primary" id="retryBtn">Reintentar</button>' +
    '</div>';
  }
  return '<div class="section-card">' + content + '</div>';
}

async function sendToMake() {
  state.step = 'confirmacion';
  state.sendStatus = 'loading';
  render();

  const r = calcResults();
  const level = getLevel(r.totalPct);

  const payload = {
    empresa: state.empresa || 'Sin nombre',
    website: state.website || '',
    fecha: new Date().toISOString().split('T')[0],
    nivel_madurez: level.label,
    puntaje_total: r.totalSum,
    puntaje_maximo: r.totalMax,
    porcentaje_total: r.totalPct,
    desafios: state.openDesafios,
    mejora_prioritaria: state.openMejora
  };

  r.areas.forEach(function(a) {
    payload['total_' + a.id] = a.sum;
    payload['pct_' + a.id] = a.pct;
  });

  sections.forEach(function(sec) {
    sec.questions.forEach(function(_, i) {
      payload[sec.id + '_' + (i+1)] = state.answers[sec.id + '_' + i] || 0;
    });
  });

  try {
    const res = await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      state.sendStatus = 'success';
      state.sendMsg = '';
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch(err) {
    state.sendStatus = 'error';
    state.sendMsg = 'No se pudo enviar: ' + err.message;
  }
  render();
}

function attachEvents() {
  const startBtn = document.getElementById('startBtn');
  if (startBtn) {
    startBtn.addEventListener('click', function() {
      const val = document.getElementById('empresaInput').value.trim();
      if (!val) { document.getElementById('empresaInput').focus(); return; }
      state.empresa = val;
      state.website = document.getElementById('websiteInput') ? document.getElementById('websiteInput').value.trim() : state.website;
      state.step = 'contexto';
      state.currentSection = 0;
      render();
    });
    document.getElementById('empresaInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') startBtn.click();
    });
  }
  const websiteInput = document.getElementById('websiteInput');
  if (websiteInput) websiteInput.addEventListener('input', function(e) { state.website = e.target.value.trim(); });
  const ta1 = document.getElementById('openDesafios');
  if (ta1) ta1.addEventListener('input', function(e) { state.openDesafios = e.target.value; });
  const ta2 = document.getElementById('openMejora');
  if (ta2) ta2.addEventListener('input', function(e) { state.openMejora = e.target.value; });
  const nextContextoBtn = document.getElementById('nextContextoBtn');
  if (nextContextoBtn) nextContextoBtn.addEventListener('click', function() { state.step = 'survey'; render(); });
  document.querySelectorAll('.scale-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      state.answers[btn.dataset.key] = parseInt(btn.dataset.val);
      render();
    });
  });
  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn) prevBtn.addEventListener('click', function() {
    if (state.step === 'contexto') { state.step = 'intro'; render(); }
    else { state.currentSection--; render(); }
  });
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.addEventListener('click', function() {
    if (state.currentSection < sections.length - 1) { state.currentSection++; render(); }
    else { sendToMake(); }
  });
  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) sendBtn.addEventListener('click', sendToMake);
  const retryBtn = document.getElementById('retryBtn');
  if (retryBtn) retryBtn.addEventListener('click', sendToMake);
  const restartBtn = document.getElementById('restartBtn');
  if (restartBtn) restartBtn.addEventListener('click', function() {
    state = { step: 'intro', empresa: '', website: '', answers: {}, openDesafios: '', openMejora: '', currentSection: 0, sendStatus: null, sendMsg: '' };
    render();
  });
}

render();
</script>
</body>
</html>
