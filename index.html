<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Diagnóstico Inicial Empresas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #F7F5F0; color: #1A1714; min-height: 100vh; padding: 24px 16px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  .center { text-align: center; padding: 48px 24px; }
  .badge { display: inline-block; background: #EEF4E8; color: #2D5016; font-size: 11px; font-weight: 600; text-transform: uppercase; padding: 6px 14px; border-radius: 100px; margin-bottom: 24px; letter-spacing: .12em; }
  h1 { font-size: 34px; line-height: 1.2; margin-bottom: 16px; font-weight: 700; }
  .subtitle { font-size: 15px; color: #6B6560; line-height: 1.7; max-width: 480px; margin: 0 auto 32px; }
  .benefits { display: flex; flex-direction: column; gap: 10px; margin: 0 auto 40px; max-width: 380px; text-align: left; }
  .benefit { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .bdot { width: 22px; height: 22px; background: #EEF4E8; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #2D5016; font-weight: 700; flex-shrink: 0; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #6B6560; text-align: left; max-width: 380px; margin: 0 auto 8px; }
  .inp { width: 100%; max-width: 380px; padding: 12px 16px; border: 1.5px solid #E2DDD6; border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; background: #fff; color: #1A1714; transition: border-color .2s; }
  .inp:focus { border-color: #2D5016; }
  .btn { background: #2D5016; color: #fff; border: none; padding: 14px 36px; border-radius: 100px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; transition: opacity .2s; }
  .btn:hover { opacity: .88; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn2 { background: transparent; color: #6B6560; border: 1.5px solid #E2DDD6; padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; font-family: inherit; cursor: pointer; }
  .btn2:hover { border-color: #1A1714; color: #1A1714; }
  .prog { background: #fff; border: 1px solid #E2DDD6; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; }
  .prog-lbl { font-size: 13px; color: #6B6560; white-space: nowrap; }
  .prog-bg { flex: 1; height: 6px; background: #E2DDD6; border-radius: 100px; overflow: hidden; }
  .prog-fill { height: 100%; background: #2D5016; border-radius: 100px; transition: width .4s; }
  .prog-pct { font-size: 13px; font-weight: 600; color: #2D5016; white-space: nowrap; }
  .card { background: #fff; border: 1px solid #E2DDD6; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .card-head { padding: 18px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #E2DDD6; }
  .cdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .card-title { font-size: 16px; font-weight: 600; }
  .card-count { font-size: 13px; color: #6B6560; margin-left: auto; }
  .qrow { padding: 16px 24px; border-bottom: 1px solid #E2DDD6; }
  .qtxt { font-size: 14px; line-height: 1.55; margin-bottom: 12px; }
  .scale { display: flex; align-items: center; gap: 6px; }
  .edge { font-size: 11px; color: #6B6560; white-space: nowrap; }
  .sbtn { width: 36px; height: 36px; min-width: 36px; border-radius: 50%; border: 1.5px solid #E2DDD6; background: transparent; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; color: #6B6560; transition: all .15s; }
  .sbtn:hover { border-color: #2D5016; color: #2D5016; background: #EEF4E8; }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 12px; }
  .nav-r { display: flex; align-items: center; gap: 12px; }
  .warn { font-size: 13px; color: #C0392B; }
  .oq { padding: 16px 24px; border-bottom: 1px solid #E2DDD6; }
  .oq label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 10px; }
  textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #E2DDD6; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; outline: none; color: #1A1714; }
  textarea:focus { border-color: #2D5016; }
  .ar { display: flex; gap: 24px; align-items: flex-start; }
  .al { flex: 1; }
  .arow { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .aname { font-size: 13px; min-width: 170px; }
  .abg { flex: 1; height: 6px; background: #E2DDD6; border-radius: 100px; overflow: hidden; }
  .afill { height: 100%; border-radius: 100px; }
  .apct { font-size: 13px; font-weight: 600; min-width: 36px; text-align: right; }
  .sc { border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 20px; margin-top: 16px; }
  .sl { min-width: 80px; }
  .snum { font-size: 42px; font-weight: 700; line-height: 1; }
  .slbl { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .sdesc { font-size: 14px; line-height: 1.6; }
  .sbar { height: 6px; background: rgba(0,0,0,.1); border-radius: 100px; overflow: hidden; margin-top: 10px; }
  .sbarfill { height: 100%; border-radius: 100px; }
  .cfm { text-align: center; padding: 60px 24px; }
  .cfm-icon { font-size: 40px; margin-bottom: 16px; }
  .cfm-title { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
  .cfm-desc { font-size: 15px; color: #6B6560; max-width: 380px; margin: 0 auto; }
  .close-row { display: flex; justify-content: center; margin-top: 8px; margin-bottom: 32px; }
  .btn-close { background: #6B6560; color: #fff; border: none; padding: 14px 36px; border-radius: 100px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var WH = 'https://hook.us2.make.com/dpdj7irtdqjlgjtuuqe11gme5gwj38yq';

var SEC = [
  { id:'s1', title:'Estrategia y Visión', color:'#534AB7', q:[
    'Tenemos una visión y estrategia empresarial claramente definidas y documentadas.',
    'Nuestros objetivos de largo plazo (5–10 años) están claramente definidos y guían nuestras decisiones.',
    'Tenemos claramente definido nuestro cliente ideal y mercado objetivo.',
    'Nuestra propuesta de valor o diferenciación competitiva es clara.' ]},
  { id:'s2', title:'Visibilidad Financiera', color:'#185FA5', q:[
    'Nuestros estados financieros son precisos y se entregan mensualmente.',
    'Operamos con un presupuesto y comparamos resultados reales contra el plan.',
    'Entendemos qué productos, servicios o clientes generan más rentabilidad.',
    'Podemos responder rápidamente preguntas sobre dónde ganamos dinero.' ]},
  { id:'s3', title:'Contabilidad y Reportes', color:'#0F6E56', q:[
    'Nuestra contabilidad está limpia, actualizada y es confiable.',
    'Los reportes financieros son claros y fáciles de entender para la dirección.',
    'El equipo directivo utiliza la información financiera para tomar decisiones.',
    'Monitoreamos activamente el flujo de caja.' ]},
  { id:'s4', title:'Disciplina Operativa', color:'#854F0B', q:[
    'Tenemos un proceso estructurado de planeación anual.',
    'Realizamos revisiones trimestrales para evaluar resultados y ajustar planes.',
    'El equipo directivo tiene reuniones semanales estructuradas para revisar prioridades.',
    'Las decisiones operativas se toman basadas en datos y métricas.' ]},
  { id:'s5', title:'Métricas y KPIs', color:'#993556', q:[
    'Medimos un conjunto claro de KPIs que reflejan la salud del negocio.',
    'La dirección revisa estos indicadores semanal o mensualmente.',
    'Cada área o líder tiene métricas claras por las cuales es responsable.',
    'Contamos con un scorecard o dashboard de desempeño.' ]},
  { id:'s6', title:'Sistemas y Procesos', color:'#5F5E5A', q:[
    'Nuestros procesos clave están documentados.',
    'Nuestros sistemas facilitan la operación y los reportes financieros.',
    'La información fluye correctamente entre sistemas financieros y operativos.',
    'Existe un responsable claro para cada proceso clave del negocio.' ]},
  { id:'s7', title:'Preparación para Crecer', color:'#3B6D11', q:[
    'Tenemos claridad sobre qué se necesita para escalar el negocio.',
    'Identificamos regularmente oportunidades para mejorar la rentabilidad.',
    'La dirección confía en los números al tomar decisiones estratégicas.',
    'Tenemos un plan de crecimiento claro con metas, plazos y responsables.' ]}
];

var LV = [
  { min:0,  max:39,  lbl:'Crítico',             c:'#C0392B', bg:'#FEF0EE', d:'La empresa requiere intervención urgente en múltiples áreas fundamentales.' },
  { min:40, max:54,  lbl:'En Desarrollo',        c:'#E67E22', bg:'#FEF5EC', d:'Existen bases, pero faltan procesos clave para operar con consistencia.' },
  { min:55, max:69,  lbl:'En Progreso',          c:'#D4AC0D', bg:'#FEFBE6', d:'La empresa avanza bien pero tiene brechas que limitan su crecimiento.' },
  { min:70, max:84,  lbl:'Maduro',               c:'#27AE60', bg:'#EAF8EF', d:'La empresa cuenta con buenas prácticas. El foco debe estar en optimizar y escalar.' },
  { min:85, max:100, lbl:'Excelencia Operativa', c:'#2D5016', bg:'#EEF4E8', d:'La empresa opera con alto nivel de madurez. El desafío es mantener e innovar.' }
];

var st = { step:'intro', nombre:'', email:'', ans:{}, si:0, des:'', mej:'', ss:null, sm:'' };

function getLv(pct) {
  for (var i=0; i<LV.length; i++) { if (pct>=LV[i].min && pct<=LV[i].max) return LV[i]; }
  return LV[0];
}

function calc() {
  var areas=[], i, j, sum, sec;
  for (i=0; i<SEC.length; i++) {
    sec = SEC[i]; sum = 0;
    for (j=0; j<sec.q.length; j++) sum += st.ans[sec.id+'_'+j] || 0;
    areas.push({ id:sec.id, title:sec.title, color:sec.color, sum:sum, max:sec.q.length*5, pct:Math.round(sum/(sec.q.length*5)*100) });
  }
  var ts=0, tm=0;
  for (i=0; i<areas.length; i++) { ts+=areas[i].sum; tm+=areas[i].max; }
  return { areas:areas, ts:ts, tm:tm, tp:Math.round(ts/tm*100) };
}

function radarSVG(areas) {
  var cx=150, cy=150, r=100, n=areas.length;
  function px(i,pct) { return cx + r*(pct/100)*Math.cos(Math.PI*2*i/n - Math.PI/2); }
  function py(i,pct) { return cy + r*(pct/100)*Math.sin(Math.PI*2*i/n - Math.PI/2); }
  function grid(pct) {
    var pts='', i;
    for (i=0; i<n; i++) pts += (i?' ':'')+px(i,pct)+','+py(i,pct);
    return pts;
  }
  var svg = '<svg viewBox="0 0 300 300" width="240" height="240" xmlns="http://www.w3.org/2000/svg">';
  var gs=[25,50,75,100], g, i, cosA, anchor, words, lbl, dp='';
  for (g=0; g<gs.length; g++) {
    svg += '<polygon points="'+grid(gs[g])+'" fill="none" stroke="#E2DDD6" stroke-width="'+(gs[g]===100?'1':'0.5')+'"/>';
  }
  for (i=0; i<n; i++) {
    cosA = Math.cos(Math.PI*2*i/n - Math.PI/2);
    anchor = Math.abs(cosA)<0.1 ? 'middle' : (cosA>0 ? 'start' : 'end');
    words = areas[i].title.split(' ');
    lbl = words.length>2 ? words[0]+' '+words[1] : areas[i].title;
    svg += '<line x1="'+cx+'" y1="'+cy+'" x2="'+px(i,100)+'" y2="'+py(i,100)+'" stroke="#E2DDD6" stroke-width="1"/>';
    svg += '<text x="'+px(i,118)+'" y="'+(py(i,118)+4)+'" text-anchor="'+anchor+'" font-size="10" fill="#555" font-family="DM Sans,sans-serif">'+lbl+'</text>';
  }
  for (i=0; i<n; i++) dp += (i?' ':'')+px(i,areas[i].pct)+','+py(i,areas[i].pct);
  svg += '<polygon points="'+dp+'" fill="rgba(83,74,183,0.15)" stroke="#534AB7" stroke-width="2"/>';
  for (i=0; i<n; i++) svg += '<circle cx="'+px(i,areas[i].pct)+'" cy="'+py(i,areas[i].pct)+'" r="4" fill="'+areas[i].color+'"/>';
  svg += '</svg>';
  return svg;
}

function render() {
  var app = document.getElementById('app');
  if (st.step==='intro')  app.innerHTML = tIntro();
  else if (st.step==='survey') app.innerHTML = tSurvey();
  else if (st.step==='res') app.innerHTML = tRes();
  else app.innerHTML = tCfm();
  bind();
}

function tIntro() {
  return '<div class="center">'
    +'<div class="badge">Diagnóstico Empresarial</div>'
    +'<h1>Diagnóstico Inicial Empresas</h1>'
    +'<p class="subtitle">Esta evaluación mide la claridad financiera, disciplina operativa y preparación para el crecimiento de tu empresa. Toma 5–7 minutos.</p>'
    +'<div class="benefits">'
    +'<div class="benefit"><div class="bdot">1</div>Tu nivel de madurez por área</div>'
    +'<div class="benefit"><div class="bdot">2</div>Diagnóstico de principales áreas de mejora</div>'
    +'<div class="benefit"><div class="bdot">3</div>Recomendaciones de crecimiento y rentabilidad</div>'
    +'</div>'
    +'<div class="field"><label>Tu nombre</label>'
    +'<input class="inp" id="i-nom" type="text" placeholder="Ej: Juan Pérez" value="'+st.nombre+'"/></div>'
    +'<div class="field"><label>Tu email</label>'
    +'<input class="inp" id="i-mail" type="email" placeholder="Ej: juan@empresa.cl" value="'+st.email+'"/></div>'
    +'<br/><button class="btn" id="b-start">Comenzar diagnóstico →</button>'
    +'</div>';
}

function tSurvey() {
  var sec=SEC[st.si], isLast=st.si===SEC.length-1;
  var tq=0, i, j;
  for (i=0; i<SEC.length; i++) tq+=SEC[i].q.length;
  var pct=Math.round(Object.keys(st.ans).length/tq*100);
  var done=true;
  for (i=0; i<sec.q.length; i++) { if (!st.ans[sec.id+'_'+i]) { done=false; break; } }
  var h='<div class="prog">'
    +'<span class="prog-lbl">Sección '+(st.si+1)+' de '+SEC.length+'</span>'
    +'<div class="prog-bg"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
    +'<span class="prog-pct">'+pct+'%</span></div>'
    +'<div class="card"><div class="card-head">'
    +'<div class="cdot" style="background:'+sec.color+'"></div>'
    +'<span class="card-title">'+sec.title+'</span>'
    +'<span class="card-count">'+sec.q.length+' preguntas</span></div>';
  for (i=0; i<sec.q.length; i++) {
    var key=sec.id+'_'+i, val=st.ans[key];
    var border = i<sec.q.length-1 ? 'border-bottom:1px solid #E2DDD6' : '';
    h += '<div class="qrow" style="'+border+'"><div class="qtxt">'+sec.q[i]+'</div><div class="scale">';
    h += '<span class="edge">1 = Débil</span>';
    for (j=1; j<=5; j++) {
      var sel=val===j;
      var bg=sel?sec.color:'transparent', bc=sel?sec.color:'#E2DDD6', fc=sel?'#fff':'#6B6560';
      h += '<button class="sbtn" data-k="'+key+'" data-v="'+j+'" style="background:'+bg+';border-color:'+bc+';color:'+fc+'">'+j+'</button>';
    }
    h += '<span class="edge">5 = Fuerte</span></div></div>';
  }
  h += '</div><div class="nav">';
  h += st.si>0 ? '<button class="btn2" id="b-prev">← Anterior</button>' : '<div></div>';
  h += '<div class="nav-r">';
  if (!done) h += '<span class="warn">Responde todas las preguntas</span>';
  h += '<button class="btn" id="b-next"'+(done?'':' disabled')+'>'+(isLast?'Ver resultados →':'Siguiente →')+'</button>';
  h += '</div></div>';
  return h;
}

function tRes() {
  var rs=calc(), lv=getLv(rs.tp), i, a;
  var h='<div class="card"><div style="padding:24px;border-bottom:1px solid #E2DDD6">';
  h+='<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#6B6560;letter-spacing:.1em;margin-bottom:12px">Resultados</div>';
  h+='<div class="ar"><div class="al">';
  h+='<div style="font-size:14px;font-weight:600;margin-bottom:16px">Puntaje por área</div>';
  for (i=0; i<rs.areas.length; i++) {
    a=rs.areas[i];
    h+='<div class="arow"><span class="aname">'+a.title+'</span>'
      +'<div class="abg"><div class="afill" style="width:'+a.pct+'%;background:'+a.color+'"></div></div>'
      +'<span class="apct" style="color:'+a.color+'">'+a.pct+'%</span></div>';
  }
  h+='</div>'+radarSVG(rs.areas)+'</div></div>';
  h+='<div style="padding:0 24px 24px"><div class="sc" style="background:'+lv.bg+'">'
    +'<div class="sl">'
    +'<div style="font-size:11px;font-weight:600;color:'+lv.c+';margin-bottom:4px">Puntaje total</div>'
    +'<div class="snum" style="color:'+lv.c+'">'+rs.tp+'%</div>'
    +'<div class="slbl" style="color:'+lv.c+'">'+lv.lbl+'</div></div>'
    +'<div style="flex:1"><div class="sdesc">'+lv.d+'</div>'
    +'<div class="sbar"><div class="sbarfill" style="width:'+rs.tp+'%;background:'+lv.c+'"></div></div>'
    +'</div></div></div></div>'
    +'<div class="card"><div class="card-head"><span class="card-title">Cuéntanos más sobre tu empresa</span></div>'
    +'<div class="oq"><label>¿Cuáles son los principales desafíos que enfrenta tu empresa hoy?</label>'
    +'<textarea id="i-des" placeholder="Describe brevemente...">'+st.des+'</textarea></div>'
    +'<div class="oq" style="border-bottom:none"><label>¿Cuál es la mejora más prioritaria en los próximos 6 meses?</label>'
    +'<textarea id="i-mej" placeholder="Describe brevemente...">'+st.mej+'</textarea></div></div>'
    +'<div class="nav"><div></div><button class="btn" id="b-fin">Finalizar diagnóstico</button></div>';
  return h;
}

function tCfm() {
  var rs=calc(), lv=getLv(rs.tp), i, a;
  var h='<div class="card"><div class="cfm">'
    +'<div class="cfm-icon">✅</div>'
    +'<div class="cfm-title">¡Diagnóstico enviado!</div>'
    +'<p class="cfm-desc">Tus respuestas han sido registradas. Nos pondremos en contacto contigo con el análisis y recomendaciones.</p>'
    +'</div></div>';

  if (st.ss==='success') {
    h+='<div class="card"><div style="padding:24px;border-bottom:1px solid #E2DDD6">';
    h+='<div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#6B6560;letter-spacing:.1em;margin-bottom:12px">Resultados</div>';
    h+='<div class="ar"><div class="al">';
    h+='<div style="font-size:14px;font-weight:600;margin-bottom:16px">Puntaje por área</div>';
    for (i=0; i<rs.areas.length; i++) {
      a=rs.areas[i];
      h+='<div class="arow"><span class="aname">'+a.title+'</span>'
        +'<div class="abg"><div class="afill" style="width:'+a.pct+'%;background:'+a.color+'"></div></div>'
        +'<span class="apct" style="color:'+a.color+'">'+a.pct+'%</span></div>';
    }
    h+='</div>'+radarSVG(rs.areas)+'</div></div>';
    h+='<div style="padding:0 24px 24px"><div class="sc" style="background:'+lv.bg+'">'
      +'<div class="sl">'
      +'<div style="font-size:11px;font-weight:600;color:'+lv.c+';margin-bottom:4px">Puntaje total</div>'
      +'<div class="snum" style="color:'+lv.c+'">'+rs.tp+'%</div>'
      +'<div class="slbl" style="color:'+lv.c+'">'+lv.lbl+'</div></div>'
      +'<div style="flex:1"><div class="sdesc">'+lv.d+'</div>'
      +'<div class="sbar"><div class="sbarfill" style="width:'+rs.tp+'%;background:'+lv.c+'"></div></div>'
      +'</div></div></div></div>'
      +'<div class="close-row"><button class="btn-close" onclick="window.close()">Cerrar</button></div>';
  }

  if (st.ss==='error') {
    h+='<div class="card"><div class="cfm">'
      +'<div class="cfm-icon">❌</div>'
      +'<div class="cfm-title">Ocurrió un error</div>'
      +'<p class="cfm-desc" style="margin-bottom:24px">'+st.sm+'</p>'
      +'<button class="btn" id="b-ret">Reintentar</button>'
      +'</div></div>';
  }
  return h;
}

function doSend() {
  st.step='cfm'; st.ss='loading'; render();
  var rs=calc(), lv=getLv(rs.tp), i, j, sec;
  var p={
    nombre: st.nombre||'Sin nombre', email: st.email,
    fecha: new Date().toISOString().split('T')[0],
    nivel_madurez: lv.lbl, puntaje_total: rs.ts,
    puntaje_maximo: rs.tm, porcentaje_total: rs.tp,
    desafios: st.des, mejora_prioritaria: st.mej
  };
  for (i=0; i<rs.areas.length; i++) {
    p['total_'+rs.areas[i].id]=rs.areas[i].sum;
    p['pct_'+rs.areas[i].id]=rs.areas[i].pct;
  }
  for (i=0; i<SEC.length; i++) {
    sec=SEC[i];
    for (j=0; j<sec.q.length; j++) p[sec.id+'_'+(j+1)]=st.ans[sec.id+'_'+j]||0;
  }
  fetch(WH, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(p) })
    .then(function(r) { st.ss=r.ok?'success':'error'; if(!r.ok) st.sm='HTTP '+r.status; render(); })
    .catch(function(e) { st.ss='error'; st.sm=e.message; render(); });
}

function bind() {
  var el;
  el=document.getElementById('b-start');
  if (el) el.addEventListener('click', function() {
    var n=document.getElementById('i-nom').value.trim();
    if (!n) return;
    st.nombre=n; st.email=document.getElementById('i-mail').value.trim();
    st.step='survey'; st.si=0; render();
  });
  document.querySelectorAll('.sbtn').forEach(function(b) {
    b.addEventListener('click', function() { st.ans[b.dataset.k]=parseInt(b.dataset.v); render(); });
  });
  el=document.getElementById('i-des'); if(el) el.addEventListener('input',function(){st.des=el.value;});
  el=document.getElementById('i-mej'); if(el) el.addEventListener('input',function(){st.mej=el.value;});
  el=document.getElementById('b-prev'); if(el) el.addEventListener('click',function(){st.si--;render();});
  el=document.getElementById('b-next');
  if (el) el.addEventListener('click', function() {
    if (st.si<SEC.length-1) { st.si++; render(); } else { st.step='res'; render(); }
  });
  el=document.getElementById('b-fin'); if(el) el.addEventListener('click',doSend);
  el=document.getElementById('b-ret'); if(el) el.addEventListener('click',doSend);
}

render();
</script>
</body>
</html>
